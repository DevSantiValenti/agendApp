<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Laboratorios</title><link rel="stylesheet" th:href="@{/css/app.css}">
	<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
	<script defer th:src="@{/js/app.js}"></script></head>
<body>
<div class="app"><nav class="side"><div class="brand"><span class="brand-name">Agenda Uno</span><span class="brand-user" th:text="${usuarioActualNombre}">Administracion</span></div><a th:href="@{/turnos}">📅</a><a th:href="@{/pacientes}">👥</a><a class="active" th:href="@{/configuracion}">⚙</a><a class="logout-link" th:href="@{/logout}" title="Cerrar sesión">↪</a></nav>
<main class="main"><header class="page-head"><div class="breadcrumbs"><a th:href="@{/configuracion}">Configuración</a><span>›</span><a th:href="@{/configuracion/tablas/profesionales}">Tablas</a><span>›</span><strong>Laboratorios</strong></div></header>
<section class="content">
	<form class="form-panel" th:action="@{/configuracion/tablas/laboratorios}" method="post" th:object="${laboratorio}">
		<div class="form-grid"><label>Código <input th:field="*{codigo}"></label><label>Laboratorio <input th:field="*{nombre}" required></label><label>Contacto <input th:field="*{contacto}"></label><label>Teléfono <input th:field="*{telefono}"></label><label>Email <input th:field="*{email}"></label><label>Dirección <input th:field="*{direccion}"></label><label class="full">Observaciones <textarea th:field="*{observaciones}"></textarea></label><label><span><input type="checkbox" th:field="*{habilitado}"> Habilitado</span></label></div>
		<div class="actions"><button class="btn primary">+ Nuevo laboratorio</button></div>
	</form>
	<form class="toolbar" method="get"><input class="search" name="q" th:value="${q}" placeholder="Buscar laboratorio..."><button class="btn outline">Buscar</button></form>
	<div class="table-wrap"><table><thead><tr><th></th><th>Código</th><th>Laboratorio</th><th>Contacto</th><th>Dirección</th><th>Observaciones</th><th>Habilitado</th><th></th></tr></thead><tbody>
		<tr th:each="l : ${laboratorios}"><td>&vellip;</td><td th:text="${l.codigo}"></td><td><strong th:text="${l.nombre}"></strong><div class="muted" th:text="${l.email ?: ''}"></div></td><td th:text="${l.contacto ?: l.telefono}"></td><td th:text="${l.direccion ?: '-'}"></td><td th:text="${l.observaciones ?: '-'}"></td><td th:text="${l.habilitado ? '✓' : '⊘'}"></td><td><form th:action="@{/configuracion/tablas/laboratorios/{id}/eliminar(id=${l.id})}" method="post"><button class="btn danger">Eliminar</button></form></td></tr>
	</tbody></table></div>
</section></main></div>
</body></html>
