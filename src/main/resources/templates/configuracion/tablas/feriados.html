<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Feriados</title><link rel="stylesheet" th:href="@{/css/app.css}">
	<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
	<script defer th:src="@{/js/app.js}"></script></head>
<body>
<div class="app"><nav class="side"><div class="brand"><span class="brand-name">Agenda Uno</span><span class="brand-user" th:text="${usuarioActualNombre}">Administracion</span></div><a th:href="@{/turnos}">📅</a><a th:href="@{/pacientes}">👥</a><a class="active" th:href="@{/configuracion}">⚙</a><a class="logout-link" th:href="@{/logout}" title="Cerrar sesión">↪</a></nav>
<main class="main"><header class="page-head"><div class="breadcrumbs"><a th:href="@{/configuracion}">Configuración</a><span>›</span><a th:href="@{/configuracion/tablas/profesionales}">Tablas</a><span>›</span><strong>Feriados</strong></div></header>
<section class="content">
	<form class="form-panel" th:action="@{/configuracion/tablas/feriados}" method="post" th:object="${feriado}">
		<div class="form-grid"><label>Fecha desde <input type="date" th:field="*{fechaDesde}" required></label><label>Fecha hasta <input type="date" th:field="*{fechaHasta}" required></label><label class="full">Descripción <input th:field="*{descripcion}"></label></div>
		<div class="actions"><button class="btn primary">+ Nuevo feriado</button></div>
	</form>
	<div class="table-wrap"><table><thead><tr><th></th><th>Fecha desde</th><th>Fecha hasta</th><th>Descripción</th><th></th></tr></thead><tbody>
		<tr th:each="feriado : ${feriados}"><td>&vellip;</td><td th:text="${#temporals.format(feriado.fechaDesde, 'dd-MM-yyyy')}"></td><td th:text="${#temporals.format(feriado.fechaHasta, 'dd-MM-yyyy')}"></td><td th:text="${feriado.descripcion ?: '-'}"></td><td><form th:action="@{/configuracion/tablas/feriados/{id}/eliminar(id=${feriado.id})}" method="post"><button class="btn danger">Eliminar</button></form></td></tr>
	</tbody></table></div>
</section></main></div>
</body></html>
